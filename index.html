<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Result Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="school-header">
      <div class="school-title">SHRIPUR KINDERGARTEN SCHOOL</div>
      <div class="system-title">Online_Result_Jagat</div>
      <div class="exam-title">First Summative Evaluation_2026</div>
    </div>

    <!-- Selection Section -->
    <div class="card no-print">
      <div class="section-label">Select Class</div>
      <select id="classSec">
        <option value="">Select class</option>
      </select>

      <div class="section-label">Select Student Name</div>
      <select id="studentName">
        <option value="">Select student</option>
      </select>

      <button id="viewBtn" class="btn">View Result</button>
    </div>

    <!-- Result Display Card -->
    <div id="resultCard" class="result-display-card hidden">
      <div id="outName" class="student-main-name"></div>

      <!-- Upper Info Table -->
      <table class="info-table">
        <tr>
          <td class="info-label">Father's Name</td>
          <td id="outFather"></td>
        </tr>
        <tr>
          <td class="info-label">Class_Section</td>
          <td id="outClass"></td>
        </tr>
        <tr>
          <td class="info-label">Roll No.</td>
          <td id="outRoll"></td>
        </tr>
      </table>

      <!-- Main Marks Table -->
      <div class="table-wrap">
        <table class="main-marks-table">
          <thead>
            <tr>
              <th>Subject</th>
              <th>F.M.</th>
              <th>Scored</th>
              <th>%</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody id="subjectBody"></tbody>
        </table>
      </div>

      <!-- Lower Summary Table -->
      <table class="summary-table">
        <tr class="summary-header">
          <td>Obt_Marks</td>
          <td>Percentage</td>
          <td>Grade</td>
          <td>Rank</td>
        </tr>
        <tr class="summary-values">
          <td id="outTotalText"></td>
          <td id="outPercentText"></td>
          <td id="outGradeText"></td>
          <td id="outRankText"></td>
        </tr>
      </table>
<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
    <div class="verified-text" style="font-size: 10px; color: #888; opacity: 0.5;"> ✅ Verified_Shripur_Kindergarten_School </div>
    <button class="blue-download no-print" onclick="window.print()" style="margin: 0;">Download</button>
</div>
      
      <div class="print-only" style="color: #add8e6; font-style: italic; margin-top: 20px;">
        Designed_by_Jagat
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
