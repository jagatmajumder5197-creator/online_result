<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jagat Online Result System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="Logo_Jagat.png" alt="School Logo" class="school-logo">
        <h1 class="school-name">SHRIPUR KG SCHOOL</h1>
        
        <div class="search-section">
            <select id="classSec">
                <option value="">Select Class/Section</option>
            </select>
            <select id="studentName">
                <option value="">Select Student Name</option>
            </select>
            <button id="viewBtn" class="btn-jagat">VIEW SCORE</button>
        </div>

        <div id="resultCard" class="result-card hidden">
            <div class="card-main">
                <i class="fas fa-check-circle main-tick"></i> <span id="outName">Student Name</span>
                <button class="download-btn" onclick="window.print()"><i class="fas fa-download"></i></button> </div>

            <div class="result-summary">
                <p>Roll: <span id="outRoll" class="bold-digit"></span></p>
                <p>Total: <span id="outTotalText" class="bold-digit"></span></p>
            </div>
            
            <div class="verified-badge">
                <i class="fas fa-certificate"></i>
                <span>Verified by Shripur Kindergarten School</span>
            </div>
        </div>

        <div class="footer-brand">
            Digitally Powered by<br>
            <strong>Jagat Infrastructure with Algorithm & JS</strong>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
