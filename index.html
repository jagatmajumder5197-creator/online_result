<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>skgsresult</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="school-header">
      <div class="school-title">SHRIPUR KINDERGARTEN SCHOOL</div>
      <div class="system-title">Digital_Infrastructure_Jagat</div>
      <div class="exam-title">First Summative Evaluation_2026</div>
    </div>

    <!-- Selection Section -->
    <div class="card no-print">
      <div class="section-label">Select Class</div>
      <select id="classSec">
        <option value="">Select class</option>
      </select>

      <div class="section-label">Select Student Name</div>
      <select id="studentName">
        <option value="">Select student</option>
      </select>

      <button id="viewBtn" class="btn">View Result</button>
    </div>

    <!-- Result Display Card -->
    <div id="resultCard" class="result-display-card hidden">
      <div id="outName" class="student-main-name"></div>

      <!-- Upper Info Table -->
      <table class="info-table">
        <tr>
          <td class="info-label">Father's Name</td>
          <td id="outFather"></td>
        </tr>
        <tr>
          <td class="info-label">Class_Section</td>
          <td id="outClass"></td>
        </tr>
        <tr>
          <td class="info-label">Roll No.</td>
          <td id="outRoll"></td>
        </tr>
      </table>

      <!-- Main Marks Table -->
      <div class="table-wrap">
        <table class="main-marks-table">
          <thead>
            <tr>
              <th>Subject</th>
              <th>F.M.</th>
              <th>Scored</th>
              <th>%</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody id="subjectBody"></tbody>
        </table>
      </div>

      <!-- Lower Summary Table -->
      <table class="summary-table">
        <tr class="summary-header">
          <td>Obt_Marks</td>
          <td>Percentage</td>
          <td>Grade</td>
          <td>Rank</td>
        </tr>
        <tr class="summary-values">
          <td id="outTotalText"></td>
          <td id="outPercentText"></td>
          <td id="outGradeText"></td>
          <td id="outRankText"></td>
        </tr>
      </table>
<div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; font-family: sans-serif; text-align: center;">
      
      <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">
        <img src="https://img.icons8.com/color/48/checked-checkbox.png" alt="Verified" style="width: 20px; height: 20px; margin-right: 8px;">
        
        <span style="font-size: 16px; color: #2c3e50; font-weight: bold;">
          Verified by Shripur Kindergarten School
        </span>
      </div>

      <div class="no-print">
        <button class="blue-download" onclick="window.print()" style="padding: 6px 16px; font-size: 13px; cursor: pointer; border-radius: 4px; border: none; background-color: #007bff; color: white; font-weight: bold;">
          Download Result
        </button>
      </div>

    </div>

      
  
    </div>

  <script src="script.js"></script>
</body>
</html>
